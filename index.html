<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>无尽冬日 · 你是什么型玩家？</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, 'PingFang SC', 'Microsoft YaHei', sans-serif;
    background: linear-gradient(135deg, #0c1445 0%, #1a237e 30%, #1565c0 60%, #4fc3f7 100%);
    min-height: 100vh;
    color: #fff;
    overflow-x: hidden;
  }
  .snow {
    position: fixed; top: 0; left: 0; width: 100%; height: 100%;
    pointer-events: none; z-index: 0;
    background-image:
      radial-gradient(2px 2px at 20px 30px, #fff, transparent),
      radial-gradient(2px 2px at 40px 70px, rgba(255,255,255,0.8), transparent),
      radial-gradient(1px 1px at 90px 40px, #fff, transparent),
      radial-gradient(1px 1px at 130px 80px, rgba(255,255,255,0.6), transparent),
      radial-gradient(2px 2px at 160px 30px, #fff, transparent);
    background-size: 200px 200px;
    animation: snow 8s linear infinite;
  }
  @keyframes snow { to { background-position: 0 400px; } }
  .container {
    position: relative; z-index: 1;
    max-width: 640px; margin: 0 auto; padding: 20px 16px 40px;
  }
  .page { display: none; }
  .page.active { display: block; }
  .home-title { text-align: center; padding: 60px 0 30px; }
  .home-title h1 {
    font-size: 32px; font-weight: 800;
    text-shadow: 0 2px 20px rgba(79,195,247,0.5);
    margin-bottom: 8px;
  }
  .home-title .sub { font-size: 15px; color: rgba(255,255,255,0.7); margin-bottom: 30px; }
  .home-title .desc { font-size: 14px; color: rgba(255,255,255,0.5); line-height: 1.8; margin-bottom: 40px; }
  .btn-start {
    display: block; width: 240px; margin: 0 auto;
    padding: 16px 0; border: none; border-radius: 50px;
    background: linear-gradient(135deg, #4fc3f7, #1565c0);
    color: #fff; font-size: 18px; font-weight: 700;
    cursor: pointer; transition: all 0.3s;
    box-shadow: 0 4px 20px rgba(79,195,247,0.4);
  }
  .btn-start:hover { transform: scale(1.05); box-shadow: 0 6px 30px rgba(79,195,247,0.6); }
  .progress-bar { background: rgba(255,255,255,0.15); border-radius: 10px; height: 8px; margin-bottom: 24px; overflow: hidden; }
  .progress-fill { height: 100%; border-radius: 10px; background: linear-gradient(90deg, #4fc3f7, #81d4fa); transition: width 0.4s ease; }
  .progress-text { text-align: center; font-size: 13px; color: rgba(255,255,255,0.6); margin-bottom: 16px; }
  .question-card {
    background: rgba(255,255,255,0.08); backdrop-filter: blur(10px);

  .question-text { font-size: 18px; font-weight: 600; line-height: 1.6; margin-bottom: 24px; }
  .options { display: flex; flex-direction: column; gap: 12px; }
  .option {
    background: rgba(255,255,255,0.06); border: 1.5px solid rgba(255,255,255,0.15);
    border-radius: 14px; padding: 16px 18px; font-size: 15px; color: #fff;

  }
  .option:hover { background: rgba(79,195,247,0.15); border-color: rgba(79,195,247,0.4); }
  .option.selected { background: rgba(79,195,247,0.25); border-color: #4fc3f7; box-shadow: 0 0 15px rgba(79,195,247,0.2); }

  /* ===== 结果页 ===== */
  .result-hero {
    display: flex; gap: 16px; margin-top: 30px;
    align-items: stretch;
  }
  .avatar-card {
    flex: 0 0 180px;
    background: rgba(255,255,255,0.1); backdrop-filter: blur(10px);
    border: 1px solid rgba(255,255,255,0.15); border-radius: 20px;
    padding: 20px 12px 16px; text-align: center;
    display: flex; flex-direction: column; align-items: center; justify-content: center;

  .avatar-card .label-small { font-size: 12px; color: rgba(255,255,255,0.5); margin-bottom: 6px; }
  .avatar-card .char-name { font-size: 20px; font-weight: 800; margin-bottom: 4px; }
  .avatar-card .char-svg { margin: 10px 0; }
  .avatar-card .char-quote { font-size: 12px; color: rgba(255,255,255,0.5); line-height: 1.5; }
  .info-card {
    flex: 1;
    background: rgba(255,255,255,0.1); backdrop-filter: blur(10px);
    border: 1px solid rgba(255,255,255,0.15); border-radius: 20px;
    padding: 24px 20px; display: flex; flex-direction: column; justify-content: center;
  }
  .info-card .type-label { font-size: 12px; color: rgba(255,255,255,0.5); margin-bottom: 4px; }
  .info-card .type-name { font-size: 24px; font-weight: 800; margin-bottom: 8px; }
  .info-card .match-badge {
    display: inline-block; background: rgba(79,195,247,0.2); border: 1px solid rgba(79,195,247,0.4);
    border-radius: 20px; padding: 3px 14px; font-size: 12px; color: #81d4fa; margin-bottom: 14px;
  }
  .info-card .type-tag { font-size: 13px; color: rgba(255,255,255,0.6); margin-bottom: 8px; }
  .info-card .match-detail { font-size: 13px; color: rgba(255,255,255,0.5); line-height: 1.6; }
  .desc-card {
    background: rgba(255,255,255,0.08); backdrop-filter: blur(10px);
    border: 1px solid rgba(255,255,255,0.12); border-radius: 20px;
    padding: 24px; margin-top: 16px;
  }
  .desc-card h4 { font-size: 15px; font-weight: 700; margin-bottom: 12px; }
  .desc-card p { font-size: 14px; line-height: 2; color: rgba(255,255,255,0.75); }
  .bars-card {
    background: rgba(255,255,255,0.08); backdrop-filter: blur(10px);
    border: 1px solid rgba(255,255,255,0.12); border-radius: 20px;
    padding: 24px; margin-top: 16px;
  }
  .bars-card h4 { font-size: 15px; font-weight: 700; margin-bottom: 16px; }
  .bar-row { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; font-size: 13px; }
  .bar-name { width: 110px; text-align: right; flex-shrink: 0; color: rgba(255,255,255,0.8); }
  .bar-track { flex: 1; height: 10px; background: rgba(255,255,255,0.1); border-radius: 5px; overflow: hidden; }
  .bar-value { height: 100%; border-radius: 5px; transition: width 0.8s ease; }
  .bar-pct { width: 40px; font-size: 12px; color: rgba(255,255,255,0.5); }
  .btn-row { text-align: center; margin-top: 24px; }
  .btn-restart {
    display: inline-block; padding: 14px 40px;
    border: 1.5px solid rgba(79,195,247,0.5); border-radius: 50px;
    background: transparent; color: #4fc3f7; font-size: 15px; font-weight: 600;
    cursor: pointer; transition: all 0.3s;
  }
  .btn-restart:hover { background: rgba(79,195,247,0.15); }
  @media (max-width: 500px) {
    .result-hero { flex-direction: column; }
    .avatar-card { flex: none; }
  }
</style>
</head>
<body>
<div class="snow"></div>
<div class="container">
  <div class="page active" id="page-home">
    <div class="home-title">
      <h1>无尽冬日</h1>
      <div class="sub">你是什么型玩家？</div>
      <div class="desc">20道灵魂拷问<br>从60+题库中随机抽取<br>每次测试都是全新体验</div>
      <button class="btn-start" onclick="startQuiz()">开始测试</button>
    </div>
  </div>
  <div class="page" id="page-quiz">
    <div class="progress-text" id="progressText">1 / 30</div>
    <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
    <div class="question-card">
      <div class="question-num" id="qNum">Q1</div>
      <div class="question-text" id="qText"></div>
      <div class="options" id="qOptions"></div>
    </div>
  </div>
  <div class="page" id="page-result">
    <div class="result-hero">
      <div class="avatar-card">
        <div class="label-small">你的人格类型是：</div>
        <div class="char-name" id="rName"></div>
        <div class="char-svg" id="rAvatar"></div>
        <div class="char-quote" id="rQuote"></div>
      </div>
      <div class="info-card">
        <div class="type-label">你的主类型</div>
        <div class="type-name" id="rTypeName"></div>
        <div class="match-badge" id="rBadge"></div>
        <div class="type-tag" id="rTag"></div>
        <div class="match-detail" id="rDetail"></div>
      </div>
    </div>
    <div class="desc-card">
      <h4>该人格的简单解读</h4>
      <p id="rDesc"></p>
    </div>
    <div class="bars-card">
      <h4>你的人格维度分布</h4>
      <div id="rBars"></div>
    </div>
    <div class="btn-row">
      <button class="btn-restart" onclick="restart()">重新测试</button>
    </div>
  </div>
</div>

let current = 0;
let scores = {};
let questions = []; // 当前轮次抽到的题

function shuffleArray(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function startQuiz() {
  current = 0;
  scores = {};
  // 从题库随机抽取 QUIZ_COUNT 道题
  questions = shuffleArray(questionBank).slice(0, QUIZ_COUNT);
  showPage('page-quiz');
  renderQuestion();
}

function showPage(id) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

function renderQuestion() {
  const q = questions[current];
  document.getElementById('qNum').textContent = `Q${current + 1}`;
  document.getElementById('qText').textContent = q.q;
  document.getElementById('progressText').textContent = `${current + 1} / ${questions.length}`;
  document.getElementById('progressFill').style.width = `${((current) / questions.length) * 100}%`;
  const optDiv = document.getElementById('qOptions');
  optDiv.innerHTML = '';
  const shuffled = [...q.opts].sort(() => Math.random() - 0.5);
  shuffled.forEach(opt => {
    const el = document.createElement('div');
    el.className = 'option';
    el.textContent = opt.text;
    el.onclick = () => selectOption(opt.type, el);
    optDiv.appendChild(el);
  });
}

function selectOption(type, el) {
  if (el.classList.contains('selected')) return;
  document.querySelectorAll('.option').forEach(o => o.style.pointerEvents = 'none');
  el.classList.add('selected');
  scores[type] = (scores[type] || 0) + 1;
  setTimeout(() => {
    current++;
    if (current < questions.length) renderQuestion();
    else showResult();
  }, 400);
}

function showResult() {
  document.getElementById('progressFill').style.width = '100%';
  const sorted = Object.entries(scores).sort((a, b) => b[1] - a[1]);
  const topType = sorted[0][0];
  const topCount = sorted[0][1];
  const pct = Math.round((topCount / questions.length) * 100);
  const profile = profiles[topType];

  // 头像卡片
  document.getElementById('rName').textContent = topType;
  document.getElementById('rAvatar').innerHTML = generateAvatar(topType);
  document.getElementById('rQuote').textContent = profile.quote;

  // 信息卡片
  document.getElementById('rTypeName').textContent = topType;
  document.getElementById('rBadge').textContent = `匹配度 ${pct}% · 命中 ${topCount}/${questions.length} 题`;
  document.getElementById('rTag').textContent = profile.tag;
  document.getElementById('rDetail').textContent = `维度命中较高，当前结果可视为你的第一人格画像。`;

  // 解读
  document.getElementById('rDesc').textContent = profile.desc;

  // 柱状图 - 彩色
  const barColors = ['#4fc3f7','#81d4fa','#b3e5fc','#e1f5fe','#e0e0e0'];
  const barsHtml = [];
  sorted.slice(0, 5).forEach(([name, count], i) => {
    const p2 = Math.round((count / questions.length) * 100);
    const bc2 = barColors[i] || barColors[4];
    barsHtml.push(`
      <div class="bar-row">
        <span class="bar-name">${name}</span>
        <div class="bar-track"><div class="bar-value" style="width:${p2}%;background:${bc2}"></div></div>
        <span class="bar-pct">${p2}%</span>
      </div>
    `);
  });
  document.getElementById('rBars').innerHTML = barsHtml.join('');

  showPage('page-result');
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function restart() {
  showPage('page-home');
  window.scrollTo({ top: 0, behavior: 'smooth' });
}
