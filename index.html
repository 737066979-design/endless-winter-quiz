<!DOCTYPE html>

</head>

</div>

let current = 0;
let scores = {};

function startQuiz() {
  current = 0;
  scores = {};
  showPage('page-quiz');
  renderQuestion();
}

function showPage(id) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

function renderQuestion() {
  const q = questions[current];
  document.getElementById('qNum').textContent = `Q${current + 1}`;
  document.getElementById('qText').textContent = q.q;
  document.getElementById('progressText').textContent = `${current + 1} / ${questions.length}`;
  document.getElementById('progressFill').style.width = `${((current) / questions.length) * 100}%`;

  const optDiv = document.getElementById('qOptions');
  optDiv.innerHTML = '';
  // 随机打乱选项顺序
  const shuffled = [...q.opts].sort(() => Math.random() - 0.5);
  shuffled.forEach(opt => {
    const el = document.createElement('div');
    el.className = 'option';
    el.textContent = opt.text;
    el.onclick = () => selectOption(opt.type, el);
    optDiv.appendChild(el);
  });
}

function selectOption(type, el) {
  // 防止重复点击
  if (el.classList.contains('selected')) return;
  document.querySelectorAll('.option').forEach(o => o.style.pointerEvents = 'none');
  el.classList.add('selected');

  scores[type] = (scores[type] || 0) + 1;

  setTimeout(() => {
    current++;
    if (current < questions.length) {
      renderQuestion();
    } else {
      showResult();
    }
  }, 400);
}

function showResult() {
  document.getElementById('progressFill').style.width = '100%';

  // 计算结果
  const sorted = Object.entries(scores).sort((a, b) => b[1] - a[1]);
  const top = sorted[0];
  const topType = top[0];
  const topCount = top[1];
  const pct = Math.round((topCount / questions.length) * 100);

  const profile = profiles[topType] || { tag: "未知", desc: "你是一个神秘的玩家。", emoji: "❓" };

  document.getElementById('rTitle').textContent = `${profile.emoji} ${topType}`;
  document.getElementById('rTag').textContent = profile.tag;
  document.getElementById('rDesc').textContent = profile.desc;

  // 统计数字
  document.getElementById('rStats').innerHTML = `
    <div class="stat-item">
      <div class="stat-value">${pct}%</div>
      <div class="stat-label">匹配度</div>
    </div>
    <div class="stat-item">
      <div class="stat-value">${topCount}/${questions.length}</div>
      <div class="stat-label">命中题数</div>
    </div>
    <div class="stat-item">
      <div class="stat-value">${sorted.length}</div>
      <div class="stat-label">涉及人格</div>
    </div>
  `;

  // 前5名柱状图
  const barsHtml = ['<h4>你的人格分布 TOP 5</h4>'];
  sorted.slice(0, 5).forEach(([name, count]) => {
    const p = Math.round((count / questions.length) * 100);
    barsHtml.push(`
      <div class="bar-row">
        <span class="bar-name">${name}</span>
        <div class="bar-track"><div class="bar-value" style="width:${p}%"></div></div>
        <span class="bar-pct">${p}%</span>
      </div>
    `);
  });
  document.getElementById('rBars').innerHTML = barsHtml.join('');

  showPage('page-result');
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function restart() {
  showPage('page-home');
  window.scrollTo({ top: 0, behavior: 'smooth' });
}
